name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - '*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Source/ResearchTree/FluffyResearchTree.csproj

      - name: Build
        run: dotnet build Source/ResearchTree/FluffyResearchTree.csproj --configuration Release --no-restore

      - name: Upload built DLL for release job
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: built-dll
          path: 1.6/Assemblies/FluffyResearchTree.dll
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: built-dll
          path: /tmp/release-dll

      - name: Place built DLL into repository
        run: cp /tmp/release-dll/FluffyResearchTree.dll 1.6/Assemblies/FluffyResearchTree.dll

      - name: Package full built repository
        run: |
          mkdir -p dist
          archive_name="ResearchTreePlusPlus-${GITHUB_REF_NAME}.zip"
          zip -r "dist/${archive_name}" . \
            -x ".git/*" \
            -x "dist/*" \
            -x "**/.vs/*" \
            -x "**/bin/Debug/*" \
            -x "**/obj/*" \
            -x "**/*.user"
          echo "ARCHIVE_PATH=dist/${archive_name}" >> "$GITHUB_ENV"

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          generate_release_notes: true
