name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - '*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Source/ResearchTree/FluffyResearchTree.csproj

      - name: Build
        run: dotnet build Source/ResearchTree/FluffyResearchTree.csproj --configuration Release --no-restore
