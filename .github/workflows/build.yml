name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - '*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Source/ResearchTree/FluffyResearchTree.csproj --locked-mode

      - name: Build
        run: dotnet build Source/ResearchTree/FluffyResearchTree.csproj --configuration Release --no-restore

      - name: Upload full source with build files
        uses: actions/upload-artifact@v4
        with:
          name: full-source-with-build-files
          path: |
            .
            !.git/**
            !.vs/**
            !dist/**
          if-no-files-found: error
          retention-days: 1

      - name: Upload built DLL for release job
        uses: actions/upload-artifact@v4
        with:
          name: built-dll
          path: 1.6/Assemblies/FluffyResearchTree.dll
          if-no-files-found: error
          retention-days: 1

  release:
    runs-on: windows-latest
    if: github.ref_type == 'tag'
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download built DLL artifact
        uses: actions/download-artifact@v4
        with:
          name: built-dll
          path: ${{ runner.temp }}/release-dll

      - name: Place built DLL into repository
        run: Copy-Item -Path $env:RUNNER_TEMP/release-dll/FluffyResearchTree.dll -Destination 1.6/Assemblies/FluffyResearchTree.dll -Force

      - name: Package full built repository
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $archiveName = "ResearchTreePlusPlus-$env:GITHUB_REF_NAME.zip"
          $staging = Join-Path $env:RUNNER_TEMP "release-archive"
          if (Test-Path $staging) { Remove-Item -Path $staging -Recurse -Force }
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          robocopy . $staging /E /NFL /NDL /NJH /NJS /NC /NS /XD .git dist .vs /XF *.user
          if ($LASTEXITCODE -gt 7) { exit $LASTEXITCODE }
          Get-ChildItem -Path $staging -Recurse -Directory -Filter obj | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $staging -Recurse -Directory -Filter Debug | Where-Object { $_.Parent.Name -eq "bin" } | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          if (!(Test-Path (Join-Path $staging 'Source'))) { throw "Release package must include full project source." }
          if (!(Test-Path (Join-Path $staging '1.6/Assemblies/FluffyResearchTree.dll'))) { throw "Release package is missing 1.6/Assemblies/FluffyResearchTree.dll." }
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath (Join-Path 'dist' $archiveName) -Force
          "ARCHIVE_PATH=dist/$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE_PATH }}
          generate_release_notes: true
